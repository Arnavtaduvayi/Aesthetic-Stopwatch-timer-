<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aesthetic Time</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="top-controls">
      <button id="military-toggle" class="mode-toggle military-toggle" aria-label="24h / 12h" title="Toggle 24-hour (military) or 12-hour time">
        24h
      </button>
      <button id="mode-toggle" class="mode-toggle" aria-label="Switch mode">
        now
      </button>
      <button id="action-toggle" class="mode-toggle ghost hidden" aria-label="Start or stop">
        start
      </button>
      <button id="reset-btn" class="mode-toggle ghost hidden" aria-label="Reset">
        reset
      </button>
      <button id="timer-adjust" class="mode-toggle ghost hidden" aria-label="Adjust timer">
        set 05:00
      </button>
    </div>

    <main class="time-display" aria-live="polite">
      <div class="time-row">
        <div class="time-unit hours">
          <div class="digit" id="hours">00</div>
        </div>
        <div class="separator">:</div>
        <div class="time-unit minutes">
          <div class="digit" id="minutes">00</div>
        </div>
        <div class="separator">:</div>
        <div class="time-unit seconds">
          <div class="digit" id="seconds">00</div>
        </div>
        <div class="sub-unit hidden" id="sub-unit">
          <span class="sub-digit" id="sub-value">.00</span>
        </div>
        <span class="ampm hidden" id="ampm"></span>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
