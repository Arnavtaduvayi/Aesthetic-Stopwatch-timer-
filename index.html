<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aesthetic Time</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="top-controls top-controls-left">
      <button id="mode-now" class="mode-btn active" data-mode="clock" aria-label="Current time">now</button>
      <button id="mode-stopwatch" class="mode-btn" data-mode="stopwatch" aria-label="Stopwatch">stopwatch</button>
      <button id="mode-timer" class="mode-btn" data-mode="timer" aria-label="Timer">timer</button>
    </div>
    <div class="top-controls top-controls-right">
      <button id="spotify-connect" class="mode-toggle ghost" aria-label="Connect Spotify">
        spotify
      </button>
      <button id="military-toggle" class="mode-toggle military-toggle" aria-label="24h / 12h" title="Toggle 24-hour (military) or 12-hour time">
        24h
      </button>
      <button id="action-toggle" class="mode-toggle ghost hidden" aria-label="Start or stop">
        start
      </button>
      <button id="reset-btn" class="mode-toggle ghost hidden" aria-label="Reset">
        reset
      </button>
      <div class="timer-set hidden" id="timer-set">
        <input type="number" id="timer-hr" min="0" max="99" placeholder="0" aria-label="Hours" inputmode="numeric" />
        <span class="timer-set-sep">:</span>
        <input type="number" id="timer-min" min="0" max="59" placeholder="0" aria-label="Minutes" inputmode="numeric" />
        <span class="timer-set-sep">:</span>
        <input type="number" id="timer-sec" min="0" max="59" placeholder="0" aria-label="Seconds" inputmode="numeric" />
        <button id="timer-apply" class="mode-toggle ghost" aria-label="Apply">set</button>
      </div>
    </div>

    <main class="time-display" aria-live="polite">
      <div class="time-row">
        <div class="time-unit hours">
          <div class="digit" id="hours">00</div>
        </div>
        <div class="separator">:</div>
        <div class="time-unit minutes">
          <div class="digit" id="minutes">00</div>
        </div>
        <div class="separator">:</div>
        <div class="time-unit seconds">
          <div class="digit" id="seconds">00</div>
        </div>
        <div class="sub-unit hidden" id="sub-unit">
          <span class="sub-digit" id="sub-value">.00</span>
        </div>
        <span class="ampm hidden" id="ampm"></span>
      </div>
    </main>

    <section class="spotify-panel hidden" id="spotify-panel" aria-live="polite">
      <div class="spotify-art-shell">
        <div id="spotify-drag-handle" class="spotify-drag-handle" aria-label="Drag panel">drag</div>
        <img id="spotify-art" class="spotify-art" alt="Album art" />
        <div class="spotify-overlay">
          <div class="spotify-meta">
            <div id="spotify-track" class="spotify-track">Not connected</div>
            <div id="spotify-artist" class="spotify-artist">Connect Spotify to show now playing</div>
          </div>
          <div class="spotify-progress-wrap">
            <span id="spotify-elapsed" class="spotify-time">0:00</span>
            <input id="spotify-progress" class="spotify-progress" type="range" min="0" max="1000" value="0" step="1" aria-label="Track progress" />
            <span id="spotify-duration" class="spotify-time">0:00</span>
          </div>
          <div class="spotify-controls">
            <button id="spotify-prev" class="spotify-btn" aria-label="Previous">⏮</button>
            <button id="spotify-rewind" class="spotify-btn" aria-label="Rewind 10 seconds">↺10</button>
            <button id="spotify-play" class="spotify-btn" aria-label="Play or pause">⏯</button>
            <button id="spotify-next" class="spotify-btn" aria-label="Next">⏭</button>
          </div>
        </div>
      </div>
      <div id="spotify-resize-handle" class="spotify-resize-handle" aria-label="Resize panel"></div>
    </section>

    <div id="cursor-dot" class="cursor-dot"></div>
    <div id="cursor-follower" class="cursor-follower"></div>

    <script src="main.js"></script>
  </body>
</html>
